<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do list Applications</title>
    <link rel="stylesheet" href="./style.css">
</head>  
<body>
    <div id="container">
        <h1>📝 To-Do List Application</h1>
        <p class="subtitle">Stay organized. Stay productive</p>
        <div class="input-section">
            <input 
            type="text"
            id="taskInput"
            placeholder="Enter your task"
            autocomplete="off">
            <button id="addbutton">
                Add Task
            </button>
        </div>
        <div id="filters">
            <button id="allBtn">All</button>
            <button id="activeBtn">Active</button>
            <button id="completedBtn">Completed</button>
        </div>
        <div id="taskCounter">
           <div class="card">
            <h3>Total Tasks</h3>
            <span id="totalTasks">0</span>
        </div>
        <div class="card">
            <h3>Completed</h3>
            <span id="completedTasks">0</span>
        </div>
        <div class="card">
            <h3>pending</h3>
            <span id="pendingTasks">0</span>
        </div>
    </div>
       <ul id="tasklist"></ul>
       <p class="footer">
        © 2026 To-Do List App
       </p>
 </div>
    <script src="./first.js"></script>
</body> 
</html>
